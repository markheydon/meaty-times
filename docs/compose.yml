# Local Jekyll preview via Podman (or Docker Compose).
#
# From this directory (docs/):
#   podman compose up
#   podman compose run --rm site build
#
# Open http://127.0.0.1:4000

services:
  site:
    image: docker.io/ruby:3.3-bookworm
    working_dir: /site
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./:/site:Z
      - jekyll-bundle:/bundle
    environment:
      BUNDLE_PATH: /bundle
      PAGES_REPO_NWO: markheydon/meaty-times
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        gem install bundler --no-document
        bundle install
        bundle exec jekyll serve --host 0.0.0.0 --baseurl "" --livereload

  build:
    image: docker.io/ruby:3.3-bookworm
    working_dir: /site
    profiles:
      - build
    volumes:
      - ./:/site:Z
      - jekyll-bundle:/bundle
    environment:
      BUNDLE_PATH: /bundle
      PAGES_REPO_NWO: markheydon/meaty-times
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        gem install bundler --no-document
        bundle install
        bundle exec jekyll build --baseurl ""
        echo "Site generated in ./_site"

volumes:
  jekyll-bundle:
