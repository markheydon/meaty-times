version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
    assignees:
      - markheydon
    groups:
      test-packages:
        patterns:
          - xunit*
          - NSubstitute
          - bunit
          - Microsoft.NET.Test.Sdk
          - coverlet*
        update-types:
          - minor
          - patch
      microsoft-extensions:
        patterns:
          - Microsoft.Extensions.*
        update-types:
          - minor
          - patch
      azure-packages:
        patterns:
          - Azure.*
        update-types:
          - minor
          - patch
      opentelemetry:
        patterns:
          - OpenTelemetry.*
        update-types:
          - minor
          - patch
      analyzers:
        patterns:
          - "*Analyzers"
          - Microsoft.CodeAnalysis.*
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
    assignees:
      - markheydon
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
    assignees:
      - markheydon
    groups:
      devcontainers:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
