name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  javascript-syntax-check:
    name: JavaScript Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify JavaScript syntax
        shell: bash
        run: |
          mapfile -t js_files < <(git ls-files '*.js')

          if [[ ${#js_files[@]} -eq 0 ]]; then
            echo "No JavaScript files found."
            exit 0
          fi

          for file in "${js_files[@]}"; do
            echo "Checking syntax: ${file}"
            node --check "${file}"
          done

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore MeatyTimes.slnx

      - name: Verify formatting
        run: dotnet format MeatyTimes.slnx --no-restore --verify-no-changes --verbosity minimal

      - name: Build solution
        run: dotnet build MeatyTimes.slnx --no-restore

      - name: Run unit and component tests
        run: |
          dotnet test tests/MeatyTimes.Core.Tests/MeatyTimes.Core.Tests.csproj --no-build --verbosity normal
          dotnet test tests/MeatyTimes.Web.Tests/MeatyTimes.Web.Tests.csproj --no-build --verbosity normal

      - name: Trust ASP.NET HTTPS development certificate
        env:
          WSL_INTEROP: ""
        run: |
          dotnet dev-certs https --clean
          EXIT_CODE=0
          dotnet dev-certs https --trust || EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ] && [ $EXIT_CODE -ne 4 ]; then
            echo "dotnet dev-certs https --trust failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "SSL_CERT_DIR=$HOME/.aspnet/dev-certs/trust:/etc/ssl/certs" >> "$GITHUB_ENV"

      - name: Run Aspire integration tests
        id: integration-tests
        run: dotnet test tests/MeatyTimes.AppHost.Tests/MeatyTimes.AppHost.Tests.csproj --no-build --verbosity normal
        timeout-minutes: 15
        env:
          SSL_CERT_DIR: ${{ env.SSL_CERT_DIR }}
          # Optional: enable when tests provision or call Azure resources
          # AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          # AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Collect DCP logs on integration test failure
        if: failure() && steps.integration-tests.conclusion == 'failure'
        run: |
          mkdir -p TestResults/DCPLogs
          cp -r "${TMPDIR:-/tmp}/dcp/logs/"* TestResults/DCPLogs/ 2>/dev/null || true

      - name: Upload DCP logs
        if: failure() && steps.integration-tests.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dcp-logs
          path: TestResults/DCPLogs
          if-no-files-found: ignore
