version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    assignees:
      - "markheydon"
    groups:
      test-packages:
        patterns:
          - "xunit*"
          - "NSubstitute"
          - "bunit"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet*"
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      azure-packages:
        patterns:
          - "Azure.*"
      opentelemetry:
        patterns:
          - "OpenTelemetry.*"
      analyzers:
        patterns:
          - "*Analyzers"
          - "Microsoft.CodeAnalysis.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    assignees:
      - "markheydon"
